  <!-- Broadcast tower illustration — centred in left half -->
  <g transform="translate(280, 130)">
    <!-- Tower base platform -->
    <rect x="60" y="330" width="120" height="6" rx="2" fill="#1e293b"/>

    <!-- Tower legs (triangular lattice) -->
    <line x1="95" y1="100" x2="70" y2="330" stroke="url(#towerGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="145" y1="100" x2="170" y2="330" stroke="url(#towerGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Cross braces -->
    <line x1="80" y1="180" x2="160" y2="180" stroke="#475569" stroke-width="2" opacity="0.6"/>
    <line x1="76" y1="230" x2="164" y2="230" stroke="#475569" stroke-width="2" opacity="0.6"/>
    <line x1="72" y1="280" x2="168" y2="280" stroke="#475569" stroke-width="2" opacity="0.6"/>
    <!-- Diagonal braces -->
    <line x1="84" y1="180" x2="156" y2="230" stroke="#334155" stroke-width="1.5" opacity="0.4"/>
    <line x1="156" y1="180" x2="84" y2="230" stroke="#334155" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="230" x2="160" y2="280" stroke="#334155" stroke-width="1.5" opacity="0.4"/>
    <line x1="160" y1="230" x2="80" y2="280" stroke="#334155" stroke-width="1.5" opacity="0.4"/>

    <!-- Tower antenna mast -->
    <line x1="120" y1="20" x2="120" y2="100" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <!-- Tower top cap -->
    <polygon points="95,100 145,100 120,85" fill="url(#steelLight)"/>

    <!-- Antenna beacon (glowing amber) -->
    <circle cx="120" cy="20" r="8" fill="url(#amber)" filter="url(#glow)"/>
    <circle cx="120" cy="20" r="4" fill="#fcd34d"/>

    <!-- Broadcast signal waves (concentric arcs radiating from beacon) -->
    <g stroke="url(#amber)" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M 120,20 m -30,-30 a 42,42 0 0,1 60,0" stroke-width="2.5" opacity="0.8"/>
      <path d="M 120,20 m -50,-45 a 67,67 0 0,1 100,0" stroke-width="2" opacity="0.55"/>
      <path d="M 120,20 m -70,-58 a 90,90 0 0,1 140,0" stroke-width="1.5" opacity="0.35"/>
      <path d="M 120,20 m -90,-70 a 114,114 0 0,1 180,0" stroke-width="1" opacity="0.2"/>
    </g>

    <!-- Relay nodes (small circles catching the signal) -->
    <g>
      <!-- Relay 1 — top left -->
      <circle cx="30" cy="60" r="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
      <circle cx="30" cy="60" r="2" fill="#22d3ee" opacity="0.6"/>
      <!-- Relay 2 — top right -->
      <circle cx="210" cy="50" r="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
      <circle cx="210" cy="50" r="2" fill="#22d3ee" opacity="0.5"/>
      <!-- Relay 3 — far left -->
      <circle cx="0" cy="120" r="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
      <circle cx="0" cy="120" r="1.8" fill="#22d3ee" opacity="0.4"/>
      <!-- Relay 4 — far right -->
      <circle cx="240" cy="110" r="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
      <circle cx="240" cy="110" r="1.8" fill="#22d3ee" opacity="0.4"/>
      <!-- Relay 5 — upper middle-left -->
      <circle cx="50" cy="10" r="4" fill="#1e293b" stroke="#22d3ee" stroke-width="1" opacity="0.35"/>
      <circle cx="50" cy="10" r="1.5" fill="#22d3ee" opacity="0.3"/>
      <!-- Relay 6 — upper middle-right -->
      <circle cx="190" cy="5" r="4" fill="#1e293b" stroke="#22d3ee" stroke-width="1" opacity="0.35"/>
      <circle cx="190" cy="5" r="1.5" fill="#22d3ee" opacity="0.3"/>
    </g>

    <!-- Dotted connection lines from beacon to relays -->
    <g stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.2">
      <line x1="120" y1="20" x2="30" y2="60"/>
      <line x1="120" y1="20" x2="210" y2="50"/>
      <line x1="120" y1="20" x2="0" y2="120"/>
      <line x1="120" y1="20" x2="240" y2="110"/>
      <line x1="120" y1="20" x2="50" y2="10"/>
      <line x1="120" y1="20" x2="190" y2="5"/>
    </g>

    <!-- Lightning bolt on the tower -->
    <g filter="url(#glow)" transform="translate(108, 120)">
      <polygon points="12,0 0,25 9,25 -2,52 30,20 18,20 32,0" fill="url(#amberLight)" opacity="0.8"/>
    </g>

    <!-- Floating "kind 31402" badge -->
    <g transform="translate(155, 160)" opacity="0.6">
      <rect x="0" y="0" width="72" height="22" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="36" y="15" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" font-weight="bold" fill="#f59e0b">kind 31402</text>
    </g>
  </g>

  <!-- Divider -->
  <g transform="translate(580, 220)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="0" x2="6" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <!-- 402 badge -->
    <g transform="translate(-12, 82)">
      <rect x="0" y="0" width="30" height="18" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="15" y="13" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="9" font-weight="bold" fill="#f59e0b">402</text>
    </g>
  </g>

  <!-- Title -->
  <text x="660" y="330" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-size="52" font-weight="bold" fill="#f8fafc" letter-spacing="-1">402-announce</text>

  <!-- Tagline -->
  <text x="662" y="370" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">announce paid APIs on Nostr. no registry.</text>

  <!-- Keyword ticker -->
  <g opacity="0.06" fill="#94a3b8">
    <text y="622" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12" letter-spacing="1">
      <tspan x="40">l402</tspan>
      <tspan x="100">x402</tspan>
      <tspan x="160">nostr</tspan>
      <tspan x="230">discovery</tspan>
      <tspan x="330">lightning</tspan>
      <tspan x="430">cashu</tspan>
      <tspan x="500">ai-agents</tspan>
      <tspan x="600">bitcoin</tspan>
      <tspan x="690">micropayments</tspan>
      <tspan x="835">decentralised</tspan>
      <tspan x="970">kind-31402</tspan>
      <tspan x="1080">relay</tspan>
      <tspan x="1140">mcp</tspan>
      <tspan x="1190">typescript</tspan>
    </text>
  </g>
</svg>
